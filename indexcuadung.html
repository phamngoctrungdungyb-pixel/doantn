<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART GUARD - Giám sát cháy nổ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card { transition: all 0.3s; }
    .siren { animation: sirenFlash 0.8s infinite alternate; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <div class="max-w-4xl mx-auto p-6">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold text-red-500">🚨 SMART GUARD</h1>
        <p class="text-gray-400">Hệ thống giám sát nhiệt độ & gas - IoT</p>
      </div>
      <div id="status" class="px-6 py-2 rounded-2xl text-lg font-semibold flex items-center gap-2">
        <!-- JS tự động thay đổi -->
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Nhiệt độ -->
      <div class="card bg-zinc-900 rounded-3xl p-6">
        <div class="flex items-center gap-3 mb-4">
          <span class="text-4xl">🌡️</span>
          <h2 class="text-xl font-semibold">Nhiệt độ</h2>
        </div>
        <div id="temperature" class="text-6xl font-bold text-white">00.0°C</div>
        <div id="temp-status" class="mt-2 text-sm font-medium"></div>
      </div>

      <!-- Gas -->
      <div class="card bg-zinc-900 rounded-3xl p-6">
        <div class="flex items-center gap-3 mb-4">
          <span class="text-4xl">☁️</span>
          <h2 class="text-xl font-semibold">Nồng độ Gas</h2>
        </div>
        <div id="gas" class="text-6xl font-bold text-white">000 PPM</div>
        <div id="gas-status" class="mt-2 px-4 py-1 inline-block rounded-2xl text-sm font-medium"></div>
      </div>

      <!-- LED Mode -->
      <div class="card bg-zinc-900 rounded-3xl p-6">
        <h2 class="text-xl font-semibold mb-4">LED Mode</h2>
        <div class="flex flex-wrap gap-2">
          <button onclick="setLed('on')" class="flex-1 bg-green-600 hover:bg-green-700 py-3 rounded-2xl font-medium">ON</button>
          <button onclick="setLed('off')" class="flex-1 bg-gray-600 hover:bg-gray-700 py-3 rounded-2xl font-medium">OFF</button>
          <button onclick="setLed('blink')" class="flex-1 bg-yellow-600 hover:bg-yellow-700 py-3 rounded-2xl font-medium">BLINK</button>
          <button onclick="setLed('auto')" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-2xl font-medium">AUTO</button>
        </div>
        <div class="mt-4 text-center">
          Hiện tại: <span id="led-mode" class="font-semibold text-lg">AUTO</span>
        </div>
      </div>
    </div>

    <!-- Ngưỡng điều chỉnh -->
    <div class="mt-8 bg-zinc-900 rounded-3xl p-8">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
        ⚙️ Điều chỉnh ngưỡng
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm text-gray-400 mb-2">Nhiệt độ cảnh báo (°C)</label>
          <div class="flex">
            <input id="warnT" type="number" value="40" class="bg-zinc-800 text-white w-full px-4 py-3 rounded-l-2xl text-xl">
            <button onclick="updateThreshold('warnT')" class="bg-red-600 hover:bg-red-700 px-6 rounded-r-2xl font-medium">Cập nhật</button>
          </div>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-2">Ngưỡng SACH (PPM)</label>
          <div class="flex">
            <input id="gClean" type="number" value="300" class="bg-zinc-800 text-white w-full px-4 py-3 rounded-l-2xl text-xl">
            <button onclick="updateThreshold('gClean')" class="bg-red-600 hover:bg-red-700 px-6 rounded-r-2xl font-medium">Cập nhật</button>
          </div>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-2">Ngưỡng KHI NHE (PPM)</label>
          <div class="flex">
            <input id="gLight" type="number" value="1000" class="bg-zinc-800 text-white w-full px-4 py-3 rounded-l-2xl text-xl">
            <button onclick="updateThreshold('gLight')" class="bg-red-600 hover:bg-red-700 px-6 rounded-r-2xl font-medium">Cập nhật</button>
          </div>
        </div>
      </div>
    </div>

    <div id="last-update" class="text-center text-gray-500 text-sm mt-6"></div>
  </div>

  <!-- === BANNER CÒI BÁO CHÁY === -->
  <div id="siren-banner" class="hidden fixed bottom-8 right-8 bg-red-600 text-white px-8 py-5 rounded-3xl shadow-2xl flex items-center gap-4 text-2xl font-bold siren">
    🚨 CÓ CHÁY NGUY HIỂM!
    <button onclick="stopSiren()" 
            class="bg-white text-red-600 hover:bg-red-100 px-8 py-4 rounded-2xl font-semibold text-xl">
      TẮT CÒI
    </button>
  </div>

  <script>
    // ==================== THAY THÔNG TIN FIREBASE CỦA BẠN ====================
    const firebaseConfig = {
      apiKey: "AIzaSyBI4O17uBlvZu3ZZRYt4YSaaARjpmiybrs",
      authDomain: "doantn-4201c.firebaseapp.com",
      databaseURL: "https://doantn-4201c-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "doantn-4201c",
    };
    // =====================================================================

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let audioContext;
    let sirenInterval = null;
    let wasDanger = false;

    function startSiren() {
      if (sirenInterval) return;
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      document.getElementById('siren-banner').classList.remove('hidden');

      let freq = 400;
      sirenInterval = setInterval(() => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, audioContext.currentTime);
        gain.gain.value = 0.5;
        osc.connect(gain).connect(audioContext.destination);
        osc.start();
        setTimeout(() => osc.stop(), 280);
        freq = (freq === 400) ? 950 : 400;
      }, 320);
    }

    function stopSiren() {
      if (sirenInterval) {
        clearInterval(sirenInterval);
        sirenInterval = null;
      }
      document.getElementById('siren-banner').classList.add('hidden');
    }

    function startRealtime() {
      const monitorRef = db.ref('/iot/dung123/monitor');
      
      monitorRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        
        // Cập nhật hiển thị
        document.getElementById('temperature').textContent = data.temperature ? data.temperature.toFixed(1) + '°C' : '---';
        document.getElementById('gas').textContent = data.gasValue ? data.gasValue + ' PPM' : '---';
        document.getElementById('led-mode').textContent = (data.ledMode || 'auto').toUpperCase();

        // Gas status
        const gasEl = document.getElementById('gas-status');
        gasEl.textContent = data.gasStatus || 'SACH';
        if (data.gasStatus === 'NGUY HIEM') gasEl.className = 'mt-2 px-4 py-1 inline-block rounded-2xl text-sm font-medium bg-red-600 text-white';
        else if (data.gasStatus === 'KHI NHE') gasEl.className = 'mt-2 px-4 py-1 inline-block rounded-2xl text-sm font-medium bg-yellow-500 text-black';
        else gasEl.className = 'mt-2 px-4 py-1 inline-block rounded-2xl text-sm font-medium bg-green-600 text-white';

        // Tổng trạng thái
        const isDanger = data.fireDanger || false;
        const statusEl = document.getElementById('status');
        if (isDanger) {
          statusEl.innerHTML = `🔴 NGUY HIỂM - CÓ CHÁY!`;
          statusEl.className = `px-6 py-2 rounded-2xl text-lg font-semibold flex items-center gap-2 bg-red-600 siren`;
        } else {
          statusEl.innerHTML = `🟢 AN TOÀN`;
          statusEl.className = `px-6 py-2 rounded-2xl text-lg font-semibold flex items-center gap-2 bg-green-600`;
        }

        // Nhiệt độ status
        const tempStatus = document.getElementById('temp-status');
        tempStatus.innerHTML = data.overTemp 
          ? `<span class="text-red-500">VƯỢT NGƯỠNG CẢNH BÁO!</span>` 
          : `<span class="text-green-500">Trong giới hạn an toàn</span>`;

        document.getElementById('last-update').textContent = `Cập nhật lần cuối: ${new Date().toLocaleTimeString('vi-VN')}`;

        // === XỬ LÝ CÒI BÁO CHÁY ===
        if (isDanger && !wasDanger) {
          startSiren();
        } else if (!isDanger && wasDanger) {
          stopSiren();
        }
        wasDanger = isDanger;
      });
    }

    function setLed(mode) {
      db.ref('/iot/dung123/control').update({ led: mode })
        .then(() => alert('Đã thay đổi LED mode: ' + mode.toUpperCase()));
    }

    function updateThreshold(field) {
      let value;
      if (field === 'warnT') value = parseFloat(document.getElementById('warnT').value);
      if (field === 'gClean') value = parseFloat(document.getElementById('gClean').value);
      if (field === 'gLight') value = parseFloat(document.getElementById('gLight').value);

      const updateObj = {};
      updateObj[field] = value;

      db.ref('/iot/dung123/control').update(updateObj)
        .then(() => alert('✅ Đã cập nhật ngưỡng thành công!'));
    }

    window.onload = () => {
      startRealtime();
    };
  </script>
</body>
</html>
